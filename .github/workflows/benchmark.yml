name: Benchmark Suite

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RAYON_NUM_THREADS: 1

jobs:
  # ─── Quick smoke test ──────────────────────────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Compile benchmarks (no-run)
        run: |
          cargo bench --bench rasterize --no-run
          cargo bench --bench chart --no-run
          cargo bench --bench efficiency --no-run

      - name: Run workspace tests (release)
        run: cargo test --workspace --release

  # ─── Full benchmark suite (manual dispatch or tag push) ──────────
  full-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-bench-

      - name: Capture environment info
        run: |
          echo "=== Environment ===" | tee bench_env.txt
          uname -a >> bench_env.txt
          lscpu >> bench_env.txt
          free -h >> bench_env.txt
          rustc --version >> bench_env.txt
          echo "RAYON_NUM_THREADS=$RAYON_NUM_THREADS" >> bench_env.txt
          cat bench_env.txt

      - name: Run rasterize benchmarks
        run: cargo bench --bench rasterize 2>&1 | tee rasterize_bench_output.txt

      - name: Run chart benchmarks
        run: cargo bench --bench chart 2>&1 | tee chart_bench_output.txt

      - name: Run efficiency benchmarks
        run: cargo bench --bench efficiency 2>&1 | tee efficiency_bench_output.txt

      - name: Run scry-chart 3D benchmarks
        run: cargo bench --bench chart3d_bench -p scry-chart 2>&1 | tee chart3d_bench_output.txt

      - name: Upload Criterion reports
        uses: actions/upload-artifact@v4
        with:
          name: criterion-reports
          path: target/criterion/

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-logs
          path: |
            bench_env.txt
            *_bench_output.txt
